<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кактус загрузка — скачать видео</title>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="logo-wrap">
      <img src="/static/logo.png" alt="Кактус" class="logo">
      <div>
        <h1>Кактус загрузка</h1>
        <p class="tagline">Скачивай видео с любых соцсетей</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card input-card">
      <label for="url-input" class="label">Вставьте ссылку на видео</label>
      <div class="input-row">
        <input
          type="url"
          id="url-input"
          placeholder="https://youtube.com/... или vk.com, tiktok.com, pinterest.com..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="analyze-btn" class="btn btn-primary">
          <span class="btn-text">Найти форматы</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>
      <div class="platforms">
        <span class="platform-badge">YouTube</span>
        <span class="platform-badge">VK</span>
        <span class="platform-badge">TikTok</span>
        <span class="platform-badge">Pinterest</span>
        <span class="platform-badge">Instagram</span>
        <span class="platform-badge">Twitter/X</span>
        <span class="platform-badge">и другие</span>
      </div>
    </section>

    <div id="error-box" class="error-box hidden"></div>

    <section id="result-section" class="hidden">
      <div class="card video-card">
        <div class="video-preview">
          <img id="thumbnail" src="" alt="Превью" class="thumbnail hidden" referrerpolicy="no-referrer">
          <div id="thumbnail-placeholder" class="thumbnail-placeholder">🌵</div>
        </div>
        <div class="video-info">
          <h2 id="video-title">—</h2>
          <div class="meta">
            <span id="video-uploader">—</span>
            <span class="dot">·</span>
            <span id="video-duration">—</span>
            <span class="dot">·</span>
            <span id="video-platform">—</span>
          </div>
        </div>
      </div>

      <div class="card formats-card">
        <div class="formats-header">
          <h3>Выберите формат</h3>
          <span id="formats-count" class="formats-count"></span>
        </div>
        <div id="formats-list" class="formats-list"></div>
        <button id="download-btn" class="btn btn-download" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span class="btn-text">Скачать</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Кактус загрузка · Бесплатный сервис для скачивания видео</p>
  </footer>

  <script src="/static/app.js?v=5"></script>
</body>
</html>
