services:
  kaktus:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:10000"
    env_file:
      - .env
    volumes:
      - ./cookies:/app/cookies
      - ./downloads:/app/downloads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10000/api/ping', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
